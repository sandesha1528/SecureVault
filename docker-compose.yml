services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: securevault-backend
    restart: unless-stopped
    env_file: .env
    volumes:
      - vault_data:/app/data
      - vault_ca:/app/ca
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: securevault-frontend
    restart: unless-stopped
    networks:
      - internal
    depends_on:
      - backend

  nginx:
    image: nginx:1.25-alpine
    container_name: securevault-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    networks:
      - internal
    depends_on:
      - backend
      - frontend

volumes:
  vault_data:
  vault_ca:

networks:
  internal:
    driver: bridge
